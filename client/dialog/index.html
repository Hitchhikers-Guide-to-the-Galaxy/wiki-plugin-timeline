<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Timeline — Fullscreen</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a2e; overflow: hidden; user-select: none; }
#stage { width: 100vw; height: 100vh; cursor: grab; }
#stage.dragging { cursor: grabbing; }
#stage svg { display: block; width: 100%; height: 100%; }
#hint {
  position: fixed; bottom: 14px; left: 50%;
  transform: translateX(-50%);
  font: 12px sans-serif; color: #555;
  background: rgba(0,0,0,.35); padding: 5px 12px; border-radius: 20px;
  pointer-events: none; white-space: nowrap;
}
</style>
</head>
<body>
<div id="stage"><svg id="svg" xmlns="http://www.w3.org/2000/svg"></svg></div>
<div id="hint">Drag to pan &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Click event to open page in source tab &nbsp;·&nbsp; Close tab to return</div>
<script>
(function () {
  const stage = document.getElementById('stage')

  let pageKey, context = []

  // Receive SVG + context from opener tab
  window.addEventListener('message', e => {
    if (!e.data || !e.data.svg) return
    stage.innerHTML = e.data.svg
    pageKey  = e.data.pageKey
    context  = e.data.context || []
    initInteraction()
  })

  // Signal opener that we are ready — triggers a reliable resend
  const signalReady = () => {
    if (window.opener) window.opener.postMessage({ action: 'ready' }, '*')
  }
  // Signal immediately, and once DOM is settled
  signalReady()
  window.addEventListener('load', signalReady, { once: true })

  function initInteraction () {
    const svg = stage.querySelector('svg')
    if (!svg) return

    // ── Pan / zoom via viewBox ────────────────────────────────────────────
    let vb       = getVB(svg)
    let dragStart = null
    let didDrag  = false   // tracks whether the pointer moved enough to count as a drag

    stage.addEventListener('pointerdown', e => {
      dragStart = { x: e.clientX, y: e.clientY, vb: { ...vb } }
      didDrag = false
      stage.setPointerCapture(e.pointerId)
      stage.classList.add('dragging')
    })

    stage.addEventListener('pointermove', e => {
      if (!dragStart) return
      const dx = e.clientX - dragStart.x
      const dy = e.clientY - dragStart.y
      if (!didDrag && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) didDrag = true
      const scaleX = vb.w / svg.clientWidth
      const scaleY = vb.h / svg.clientHeight
      vb.x = dragStart.vb.x - dx * scaleX
      vb.y = dragStart.vb.y - dy * scaleY
      setVB(svg, vb)
    })

    stage.addEventListener('pointerup',     () => { dragStart = null; stage.classList.remove('dragging') })
    stage.addEventListener('pointercancel', () => { dragStart = null; stage.classList.remove('dragging') })

    stage.addEventListener('wheel', e => {
      e.preventDefault()
      const factor = e.deltaY > 0 ? 1.12 : 0.89
      const rect   = svg.getBoundingClientRect()
      const mx     = (e.clientX - rect.left)  / rect.width
      const my     = (e.clientY - rect.top)   / rect.height
      const cx     = vb.x + mx * vb.w
      const cy     = vb.y + my * vb.h
      vb.w *= factor; vb.h *= factor
      vb.x  = cx - mx * vb.w
      vb.y  = cy - my * vb.h
      setVB(svg, vb)
    }, { passive: false })

    // ── Click to navigate in source tab ──────────────────────────────────
    stage.addEventListener('click', e => {
      if (didDrag) return           // ignore drag-release clicks
      const el = e.target.closest('.timeline-event')
      if (!el) return
      const title = el.dataset.label
      if (!title || !window.opener) return
      const keepLineup = !e.shiftKey
      try {
        window.opener.postMessage({ action: 'doInternalLink', title, pageKey, context, keepLineup }, '*')
        window.opener.focus()       // bring source tab to foreground
      } catch (_) {}
    })
  }

  function getVB (svg) {
    const vb = svg.viewBox.baseVal
    if (vb && vb.width) return { x: vb.x, y: vb.y, w: vb.width, h: vb.height }
    return { x: 0, y: 0, w: svg.clientWidth || 1200, h: svg.clientHeight || 600 }
  }
  function setVB (svg, vb) {
    svg.setAttribute('viewBox', `${vb.x} ${vb.y} ${vb.w} ${vb.h}`)
  }
})()
</script>
</body>
</html>
