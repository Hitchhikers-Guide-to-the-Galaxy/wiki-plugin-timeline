<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Timeline — Fullscreen</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a2e; overflow: hidden; user-select: none; }
#stage { width: 100vw; min-height: 100vh; cursor: grab; overflow-x: hidden; }
#stage.dragging { cursor: grabbing; }
/* height:auto lets the SVG keep its natural aspect ratio rather than
   letterboxing a wide/short timeline into a tiny band */
#stage svg { display: block; width: 100%; height: auto; }
#hint {
  position: fixed; bottom: 14px; left: 50%;
  transform: translateX(-50%);
  font: 12px sans-serif; color: #555;
  background: rgba(0,0,0,.35); padding: 5px 12px; border-radius: 20px;
  pointer-events: none; white-space: nowrap;
}
#export {
  position: fixed; top: 14px; right: 14px;
  font: 12px sans-serif; color: #cdd; cursor: pointer;
  background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.18);
  padding: 6px 12px; border-radius: 6px;
  transition: background .12s, color .12s;
}
#export:hover { background: rgba(255,255,255,.18); color: #fff; }
</style>
</head>
<body>
<div id="stage"><svg id="svg" xmlns="http://www.w3.org/2000/svg"></svg></div>
<button id="export" title="Download a flat SVG — interaction metadata stripped">Export SVG</button>
<div id="hint">Drag to pan &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Click event to open page in source tab &nbsp;·&nbsp; Close tab to return</div>
<script>
(function () {
  const stage = document.getElementById('stage')

  // ── State shared across all event handlers ───────────────────────────────────
  let pageKey  = null
  let context  = []
  let vb       = { x: 0, y: 0, w: 1200, h: 600 }
  let dragStart = null
  let didDrag   = false

  // ── Receive SVG + context from the opener tab ────────────────────────────────
  // The handler is idempotent: updating innerHTML resets the SVG; we also
  // reset vb so the new picture starts at its natural viewBox.  All interaction
  // listeners are wired once (below) and keep working across SVG updates.
  window.addEventListener('message', e => {
    if (!e.data || !e.data.svg) return
    stage.innerHTML = e.data.svg
    pageKey  = e.data.pageKey
    context  = e.data.context || []
    const svg = stage.querySelector('svg')
    if (svg) vb = getVB(svg)
  })

  // Signal opener that we are ready — triggers a reliable SVG resend
  const signalReady = () => {
    if (window.opener) window.opener.postMessage({ action: 'ready' }, '*')
  }
  signalReady()
  window.addEventListener('load', signalReady, { once: true })

  // ── Pan / zoom via viewBox — wired once ──────────────────────────────────────
  stage.addEventListener('pointerdown', e => {
    dragStart = { x: e.clientX, y: e.clientY, vb: { ...vb } }
    didDrag   = false
    stage.setPointerCapture(e.pointerId)
    stage.classList.add('dragging')
  })

  stage.addEventListener('pointermove', e => {
    if (!dragStart) return
    const dx = e.clientX - dragStart.x
    const dy = e.clientY - dragStart.y
    if (!didDrag && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) didDrag = true
    const svg = stage.querySelector('svg')
    if (!svg) return
    const scaleX = vb.w / svg.clientWidth
    const scaleY = vb.h / svg.clientHeight
    vb.x = dragStart.vb.x - dx * scaleX
    vb.y = dragStart.vb.y - dy * scaleY
    setVB(svg, vb)
  })

  stage.addEventListener('pointerup',     () => { dragStart = null; stage.classList.remove('dragging') })
  stage.addEventListener('pointercancel', () => { dragStart = null; stage.classList.remove('dragging') })

  stage.addEventListener('wheel', e => {
    e.preventDefault()
    const svg = stage.querySelector('svg')
    if (!svg) return
    const factor = e.deltaY > 0 ? 1.12 : 0.89
    const rect   = svg.getBoundingClientRect()
    const mx     = (e.clientX - rect.left) / rect.width
    const my     = (e.clientY - rect.top)  / rect.height
    const cx     = vb.x + mx * vb.w
    const cy     = vb.y + my * vb.h
    vb.w *= factor; vb.h *= factor
    vb.x  = cx - mx * vb.w
    vb.y  = cy - my * vb.h
    setVB(svg, vb)
  }, { passive: false })

  // ── Click to navigate — posts doInternalLink back to the opener tab ──────────
  stage.addEventListener('click', e => {
    if (didDrag) return
    const el = e.target.closest('.timeline-event')
    if (!el) return
    const title = el.dataset.label
    if (!title) return
    if (!window.opener) return
    const keepLineup = !e.shiftKey
    try {
      window.opener.postMessage({ action: 'doInternalLink', title, pageKey, context, keepLineup }, '*')
      window.opener.focus()
    } catch (_) {}
  })

  // ── Export — download a flat SVG, round-trip hooks stripped ─────────────────
  document.getElementById('export').addEventListener('click', () => {
    const live = stage.querySelector('svg')
    if (!live) return
    const svg = live.cloneNode(true)
    const w = parseFloat(svg.getAttribute('width'))
    const h = parseFloat(svg.getAttribute('height'))
    if (w && h) svg.setAttribute('viewBox', '0 0 ' + w + ' ' + h)
    svg.querySelectorAll('[fill="transparent"]').forEach(n => n.remove())
    svg.querySelectorAll('style').forEach(n => n.remove())
    svg.querySelectorAll('[data-label]').forEach(n => n.removeAttribute('data-label'))
    svg.querySelectorAll('[class]').forEach(n => {
      if (/timeline-event|tl-/.test(n.getAttribute('class'))) n.removeAttribute('class')
    })
    const out = new XMLSerializer().serializeToString(svg)
    const blob = new Blob([out], { type: 'image/svg+xml' })
    const url  = URL.createObjectURL(blob)
    const a    = document.createElement('a')
    a.href = url; a.download = 'timeline.svg'
    document.body.appendChild(a); a.click(); a.remove()
    setTimeout(() => URL.revokeObjectURL(url), 1000)
  })

  // ── Helpers ──────────────────────────────────────────────────────────────────
  function getVB (svg) {
    const b = svg.viewBox.baseVal
    if (b && b.width) return { x: b.x, y: b.y, w: b.width, h: b.height }
    return { x: 0, y: 0, w: svg.clientWidth || 1200, h: svg.clientHeight || 600 }
  }
  function setVB (svg, v) {
    svg.setAttribute('viewBox', `${v.x} ${v.y} ${v.w} ${v.h}`)
  }
})()
</script>
</body>
</html>
